# sr v4 configuration
# Reference: https://github.com/urmzd/sr#configuration

commit:
  pattern: ^(?P<type>\w+)(?:\((?P<scope>[^)]+)\))?(?P<breaking>!)?:\s+(?P<description>.+)
  breaking_section: Breaking Changes
  misc_section: Miscellaneous
  types:
  - name: feat
    bump: minor
    section: Features
  - name: fix
    bump: patch
    section: Bug Fixes
  - name: perf
    bump: patch
    section: Performance
  - name: docs
    section: Documentation
  - name: refactor
    bump: patch
    section: Refactoring
  - name: revert
    section: Reverts
  - name: chore
  - name: ci
  - name: test
  - name: build
  - name: style
release:
  branches:
  - main
  tag_prefix: v
  changelog:
    file: CHANGELOG.md
  version_files: []
  floating_tags: true
