version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    gocyclo:
      min-complexity: 30
    goconst:
      min-len: 3
      min-occurrences: 3
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - goconst
          - gocyclo
      - path: examples/
        linters:
          - gosec
          - errcheck
          - gocyclo
